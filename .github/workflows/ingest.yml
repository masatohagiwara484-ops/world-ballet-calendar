name: Ingest

# Crawls each source's website/feed every 2 days, extracts performances, resolves
# entities, and writes them to Supabase as review_status='pending'. NOTHING is
# published here — the owner approves via Telegram (the webhook flips pending →
# published). Each source runs in isolation; one failing source never fails the
# whole job (the orchestrator handles per-source errors and `continue-on-error`
# guards the step).

on:
  schedule:
    # Every 2 days at 04:17 UTC (off-the-hour to avoid cron congestion).
    - cron: '17 4 */2 * *'
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate static dataset
        run: npm run validate:data

      - name: Run ingestion (live → pending review)
        # The orchestrator exits 0 in live mode even if some sources fail, and
        # continue-on-error guarantees the workflow is never marked failed by a
        # single flaky source.
        continue-on-error: true
        run: npx tsx scripts/ingest/run-ingest.ts --all --live
