name: CI

# Quality gate for every PR and push to main. The project's repeated failure
# mode was "compiles fine, renders blank" — this workflow is the first line of
# defence: lint, dataset integrity, ingest diff-engine self-test, and a full
# production build (the bundled dataset renders without any Supabase env vars,
# so no secrets are needed here).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate curated dataset
        run: npm run validate:data

      - name: Ingest diff-engine self-test
        run: npm run ingest:selftest

      - name: Production build
        run: npm run build
